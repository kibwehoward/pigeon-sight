<text x="430" y="671.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="bold">6. Analysis</text>
<text x="430" y="686.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">Query, model, and</text>
<text x="430" y="701.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">extract insights</text>
<rect x="325" y="761" width="210" height="58" rx="5" fill="#1a1a2e" stroke="#4a9eff" stroke-width="2"/>
<text x="430" y="776.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="bold">7. Delivery</text>
<text x="430" y="791.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">Package and distribute results</text>
<text x="430" y="806.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">to stakeholders</text>

<text x="430" y="61.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="bold">1. Capture</text>
<text x="430" y="76.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">Acquire raw drone imagery</text>
<text x="430" y="91.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">and sensor data</text>

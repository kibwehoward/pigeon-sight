<text x="430" y="196.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">Transform raw inputs into</text>
<text x="430" y="211.0" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="normal">orthomosaics, point clouds, DEMs</text>
<polygon points="430,278 497.6,330 430,382 362.4,330" fill="#2d1b00" stroke="#ff9900" stroke-width="2"/>
<text x="430" y="323.5" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="bold">3. Validation</text>
